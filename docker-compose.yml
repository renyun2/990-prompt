services:
  db:
    image: mysql:8.0
    container_name: member_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-member_system}
      MYSQL_USER: ${DB_USER:-member_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-member_pass123}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: member_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-member_user}
      DB_PASSWORD: ${DB_PASSWORD:-member_pass123}
      DB_NAME: ${DB_NAME:-member_system}
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - ./app:/var/www/html
    ports:
      - "8080:80"
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
